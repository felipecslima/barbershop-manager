<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-semibold text-gray-800 dark:text-white/90">Dashboard</h1>
    <button
      class="rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-200"
      (click)="loadCounts()"
      [disabled]="loading()"
    >
      Refresh
    </button>
  </div>

  @if (error()) {
    <div class="rounded-lg border border-error-200 bg-error-50 p-3 text-sm text-error-700 dark:border-error-500/30 dark:bg-error-500/10 dark:text-error-300">
      {{ error() }}
    </div>
  }

  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-3">
    <article class="rounded-xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/5">
      <p class="text-sm text-gray-500">Total Organizations</p>
      <p class="mt-2 text-3xl font-semibold text-gray-900 dark:text-white">{{ totalOrganizations() }}</p>
    </article>

    <article class="rounded-xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/5">
      <p class="text-sm text-gray-500">Total Users</p>
      <p class="mt-2 text-3xl font-semibold text-gray-900 dark:text-white">{{ totalUsers() }}</p>
    </article>

    <article class="rounded-xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/5">
      <p class="text-sm text-gray-500">Total Projects</p>
      <p class="mt-2 text-3xl font-semibold text-gray-900 dark:text-white">{{ totalProjects() }}</p>
    </article>
  </div>
</div>
